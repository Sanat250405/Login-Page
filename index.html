<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- We're using Tailwind CSS for styling. It's a modern and easy way to make things look good without writing custom CSS files. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="w-full max-w-md">
        <!-- Main container for our app -->
        <div id="app-container" class="bg-white rounded-xl shadow-lg p-8 transition-all duration-500">

            <!-- This section is shown when the user is NOT logged in -->
            <div id="auth-view">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Welcome!</h2>
                <p class="text-center text-gray-500 mb-6">Sign up or log in to continue.</p>

                <!-- Input fields for email and password -->
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" id="email"
                            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password"
                            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Action buttons: Login and Sign Up -->
                <div class="flex items-center justify-between mt-6 space-x-4">
                    <button id="login-btn"
                        class="w-full inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Log
                        In</button>
                    <button id="signup-btn"
                        class="w-full inline-flex justify-center py-2 px-4 border border-indigo-600 shadow-sm text-sm font-medium rounded-md text-indigo-600 bg-white hover:bg-indigo-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Sign
                        Up</button>
                </div>
                <!-- A small container to show error messages to the user -->
                <p id="error-message" class="text-red-500 text-sm mt-4 text-center h-4"></p>
            </div>

            <!-- This section is shown when the user IS logged in. 'hidden' class hides it by default. -->
            <div id="dashboard-view" class="hidden text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Logged In!</h2>
                <!-- We will display the user's email here -->
                <p class="text-gray-600 mb-6" id="user-email"></p>
                <button id="logout-btn"
                    class="w-full inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">Log
                    Out</button>
            </div>

        </div>
    </div>

    <!-- This is where all our JavaScript logic lives -->
    <script type="module">
        // ===================================================================================
        // EXPLANATION: This script is the "brain" of our login page. It handles everything
        // from user clicks to communicating with our Firebase backend.
        // ===================================================================================

        // STEP 1: Import necessary functions from the Firebase SDKs
        // We are importing the tools we need from the Firebase libraries we'll load next.
        // Think of this like getting your tools ready before starting a project.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // STEP 2: Your Firebase Project Configuration
        // This object contains the unique keys that connect your web page to YOUR specific Firebase project.
        // Without this, Firebase wouldn't know which project to send login/signup requests to.
        // -----------------------------------------------------------------------------------
        // !!! IMPORTANT !!!
        // PASTE YOUR FIREBASE CONFIGURATION OBJECT HERE (from the README instructions)
        // The error "auth/invalid-api-key" means these values are missing or incorrect.
        const firebaseConfig = {
            apiKey: "AIzaSyCxtl1IPy-VGpRMorAHGH7VOqhi1lTSHYM",
            authDomain: "my-first-project-ceb73.firebaseapp.com",
            projectId: "my-first-project-ceb73",
            storageBucket: "my-first-project-ceb73.firebasestorage.app",
            messagingSenderId: "829210652565",
            appId: "1:829210652565:web:3d4504ab99b901f73f509c",
            measurementId: "G-1YMMJWQJYF"
        };
        // -----------------------------------------------------------------------------------


        // STEP 3: Initialize Firebase
        // Here, we take the configuration object and use it to establish the connection to Firebase.
        const app = initializeApp(firebaseConfig);
        // We then get the 'auth' service from our initialized app. This 'auth' object is what we'll
        // use to perform all authentication-related tasks (login, logout, etc.).
        const auth = getAuth(app);


        // STEP 4: Get references to our HTML elements
        // We need a way for our JavaScript to interact with the HTML elements (buttons, inputs, etc.).
        // We 'grab' them by their ID and store them in variables for easy access.
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        const userEmailDisplay = document.getElementById('user-email');
        const errorMessage = document.getElementById('error-message');

        // STEP 5: Add Event Listeners
        // This is how we make our page interactive. We tell our script to "listen" for a 'click'
        // on our buttons. When a click happens, the specified function will run.

        // When the Sign Up button is clicked...
        signupBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            errorMessage.textContent = ''; // Clear previous errors

            // Use the Firebase auth service to create a new user.
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // This block runs if the signup is SUCCESSFUL.
                    console.log('Signed up successfully!', userCredential.user);
                    // The onAuthStateChanged listener below will handle showing the dashboard.
                })
                .catch((error) => {
                    // This block runs if there's an ERROR during signup.
                    console.error('Error signing up:', error.message);
                    errorMessage.textContent = error.message; // Show error to the user
                });
        });

        // When the Log In button is clicked...
        loginBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            errorMessage.textContent = ''; // Clear previous errors

            // Use the Firebase auth service to sign in an existing user.
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // This block runs if the login is SUCCESSFUL.
                    console.log('Logged in successfully!', userCredential.user);
                    // The onAuthStateChanged listener below will handle showing the dashboard.
                })
                .catch((error) => {
                    // This block runs if there's an ERROR during login.
                    console.error('Error logging in:', error.message);
                    errorMessage.textContent = error.message; // Show error to the user
                });
        });

        // When the Log Out button is clicked...
        logoutBtn.addEventListener('click', () => {
            // Use the Firebase auth service to sign the current user out.
            signOut(auth).then(() => {
                // This block runs if the logout is SUCCESSFUL.
                console.log('User signed out');
                // The onAuthStateChanged listener below will handle showing the login form.
            }).catch((error) => {
                // This block runs if there's an ERROR during logout.
                console.error('Sign out error', error);
            });
        });

        // STEP 6: Set up an Authentication State Listener
        // This is a powerful Firebase function that runs automatically whenever a user's
        // login state changes (i.e., when they log in or log out). It's the central
        // place to manage what the user sees.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If 'user' object exists, it means the user is logged IN.
                console.log('User is logged in:', user);
                // Show the dashboard view
                authView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
                // Display their email
                userEmailDisplay.textContent = `Welcome, ${user.email}`;
            } else {
                // If 'user' is null, it means the user is logged OUT.
                console.log('User is logged out');
                // Show the login/signup form
                authView.classList.remove('hidden');
                dashboardView.classList.add('hidden');
                // Clear any user-specific data
                userEmailDisplay.textContent = '';
            }
        });

    </script>
</body>

</html>
